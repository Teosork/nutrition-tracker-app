<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⚖️</text></svg>">
    <title> Nutrition Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./src/app.js"></script>
</head>
<body>
    <header>
        <h1>Nutrition Tracker</h1>
        <p>Track nutrition for daily intake by providing product barcodes.</p>
    </header>

    <main>
        <section id="add-product">
            <h2>🆕 Log Products</h2>
            <form id="barcode-form">
                <input type="text" id="barcode-input" placeholder="Enter product barcode" />
                <button type="submit" id="barcode-add-btn">Add Product</button>
            </form>
            <div id="barcode-feedback"></div>
        </section>

        <section id="products">
            <h2>🛒 Products</h2>
        </section>
        
        <section id="totals">
            <h2>🥗 Meal Totals</h2>
            <div id="totals-content"></div>
        </section>

        <section id="targets">
            <h2>🎯 Daily Targets</h2>
            <div id="targets-content"></div>
        </section>
    </main>
</body>
</html>
