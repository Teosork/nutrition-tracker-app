<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./src/app.js"></script>
</head>
<body>
    <header>
        <h1>Nutrition Tracker</h1>
        <p>Track nutrition for daily intake by providing product barcodes.</p>
    </header>

    <main>
        <section id="products">
            <h2>🛒 Products</h2>
        </section>

        <section id="missing-barcodes">
            <h2>❌ Missing Barcodes</h2>
        </section>

        <section id="totals">
            <h2>🥗 Meal Totals</h2>
            <div id="totals-content"></div>
        </section>

        <section id="targets">
            <h2>🎯 Daily Targets</h2>
            <div id="targets-content"></div>
        </section>
    </main>
</body>
</html>
